{% extends "base_pro.html" %}

{% block title %}{{ page_title }} - TaskLog PRO{% endblock %}

{% block content %}
  <div class="mb-6 flex items-end justify-between gap-6">
    <div>
      <h1 class="font-display text-3xl font-extrabold text-[#191c1e]">{{ page_title }}</h1>
      <p class="mt-2 text-sm text-[#3d4a42]">{{ page_description }}</p>
    </div>
  </div>

  <section class="overflow-visible rounded-xl border border-slate-200 bg-white shadow-sm">
    <div class="border-b border-slate-200/70 px-5 py-4">
      {% include "tasks/components/task_filters.html" %}
    </div>
    <div>
      {% include "tasks/components/task_list.html" with grouped=True %}
    </div>
  </section>
{% endblock %}
