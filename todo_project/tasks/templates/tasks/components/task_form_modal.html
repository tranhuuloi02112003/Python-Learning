<dialog id="{{ modal_id }}" class="w-full max-w-2xl rounded-xl p-0 shadow-2xl backdrop:bg-black/35">
  <form method="post" action="{{ form_action }}" class="bg-white p-6">
    {% csrf_token %}
    <input type="hidden" name="next" value="{{ request.get_full_path }}" />
    <div class="flex items-start justify-between gap-4">
      <div>
        <h2 class="font-display text-xl font-bold text-[#191c1e]">{{ modal_title }}</h2>
        <p class="mt-1 text-sm text-[#3d4a42]">Capture the task details and keep the workflow moving.</p>
      </div>
      <button type="button" onclick="this.closest('dialog').close()" class="rounded-lg p-2 text-[#3d4a42] hover:bg-[#f7f9fb]" aria-label="Close modal">
        <i data-lucide="x" class="h-5 w-5"></i>
      </button>
    </div>
    <div class="mt-6 grid grid-cols-2 gap-4">
      <label class="col-span-2 text-sm font-semibold text-[#191c1e]">Title {{ form.title }} {{ form.title.errors }}</label>
      <label class="col-span-2 text-sm font-semibold text-[#191c1e]">Description {{ form.description }} {{ form.description.errors }}</label>
      <label class="text-sm font-semibold text-[#191c1e]">Project {{ form.project }} {{ form.project.errors }}</label>
      <label class="text-sm font-semibold text-[#191c1e]">Due date {{ form.due_date }} {{ form.due_date.errors }}</label>
      <label class="text-sm font-semibold text-[#191c1e]">Status {{ form.status }} {{ form.status.errors }}</label>
      <label class="text-sm font-semibold text-[#191c1e]">Priority {{ form.priority }} {{ form.priority.errors }}</label>
    </div>
    <div class="mt-6 flex justify-end gap-3">
      <button type="button" onclick="this.closest('dialog').close()" class="rounded-lg px-4 py-2 text-sm font-semibold text-[#3d4a42] hover:bg-[#f7f9fb]">Cancel</button>
      <button type="submit" class="rounded-lg bg-[#059669] px-4 py-2 text-sm font-semibold text-white hover:bg-[#006948]">Save Task</button>
    </div>
  </form>
</dialog>
