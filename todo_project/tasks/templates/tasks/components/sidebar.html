<aside class="w-64 flex flex-col p-6 border-r border-gray-100/50">
  <div
    class="text-[11px] font-bold text-gray-400 mb-4 tracking-wider uppercase"
  >
    Dự Án<br />
    <span class="font-normal text-gray-400 lowercase capitalize"
      >Danh sách dự án</span
    >
  </div>

  <nav class="flex-1 space-y-1.5">
    <!-- Nút xem Tất cả -->
    <a
      href="/"
      class="flex items-center gap-3 px-4 py-2.5 rounded-xl transition-colors {% if not selected_project_id %}bg-gray-100 text-emerald-800 font-medium{% else %}text-gray-600 hover:bg-gray-50{% endif %}"
    >
      <svg
        class="w-5 h-5 {% if not selected_project_id %}text-emerald-600{% else %}text-gray-400{% endif %}"
        fill="none"
        stroke="currentColor"
        viewBox="0 0 24 24"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"
        ></path>
      </svg>
      <span class="text-sm">Tất cả công việc</span>
    </a>

    <!-- Danh sách Dự án -->
    <div class="pt-4 pb-2">
      <span
        class="text-[10px] font-bold text-gray-400 tracking-wider uppercase px-4"
        >Dự án của bạn</span
      >
    </div>

    {% for p in projects %}
    <!-- Inactive Project (Generic) -->
    <a
      href="/?project={{ p.id }}"
      class="flex items-center gap-3 px-4 py-2.5 rounded-xl transition-colors {% if selected_project_id == p.id %}bg-gray-100 text-emerald-800 font-medium{% else %}text-gray-600 hover:bg-gray-50{% endif %}"
    >
      <svg
        class="w-5 h-5 {% if selected_project_id == p.id %}text-emerald-600{% else %}text-gray-400{% endif %}"
        fill="none"
        stroke="currentColor"
        viewBox="0 0 24 24"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"
        ></path>
      </svg>
      <span class="text-sm">{{ p.name }}</span>
    </a>
    {% empty %}
    <span class="text-xs text-gray-400 px-4">Chưa có dự án nào</span>
    {% endfor %}
  </nav>

  <button
    onclick="toggleModal('projectModal')"
    class="mt-auto flex items-center justify-center gap-2 w-full py-2.5 bg-emerald-50 hover:bg-emerald-100 text-emerald-600 border border-emerald-200 rounded-xl font-medium transition-all shadow-sm"
  >
    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path
        stroke-linecap="round"
        stroke-linejoin="round"
        stroke-width="2"
        d="M12 4v16m8-8H4"
      ></path>
    </svg>
    <span class="text-sm">Thêm Dự Án</span>
  </button>
</aside>
