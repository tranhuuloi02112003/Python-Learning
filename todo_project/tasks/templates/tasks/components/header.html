<header class="h-16 flex items-center justify-between px-8 bg-transparent">
  <div
    class="font-bold text-xl text-emerald-800 tracking-wide flex items-center gap-2"
  >
    <span class="text-2xl">TaskLog PRO</span>
  </div>

  <div class="flex-1 max-w-xl mx-8">
    <div class="relative">
      <svg
        class="w-5 h-5 absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"
        fill="none"
        stroke="currentColor"
        viewBox="0 0 24 24"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"
        ></path>
      </svg>
      <input
        type="text"
        placeholder="Tìm kiếm công việc..."
        class="w-full bg-gray-100/50 border border-gray-200 text-gray-700 rounded-full pl-10 pr-4 py-2 focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:bg-white transition-all"
      />
    </div>
  </div>

  <div class="flex items-center">
    <div
      class="w-9 h-9 rounded-full bg-gray-200 border border-gray-300 flex items-center justify-center cursor-pointer hover:bg-gray-300 transition-colors"
    >
      <svg
        class="w-5 h-5 text-gray-600"
        fill="none"
        stroke="currentColor"
        viewBox="0 0 24 24"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"
        ></path>
      </svg>
    </div>
  </div>
</header>
