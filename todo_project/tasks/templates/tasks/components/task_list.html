<div class="flex justify-between items-center mb-8">
  <h2 class="text-2xl font-bold text-gray-800 flex items-center gap-2">
    <span>✨</span> Quản Lý Công Việc
  </h2>

  <button
    type="button"
    onclick="toggleModal('taskModal')"
    class="bg-emerald-50 hover:bg-emerald-100 text-emerald-600 border border-emerald-200 px-5 py-2.5 rounded-xl font-medium transition-all flex items-center gap-2 text-sm shadow-sm"
  >
    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path
        stroke-linecap="round"
        stroke-linejoin="round"
        stroke-width="2"
        d="M12 4v16m8-8H4"
      ></path>
    </svg>
    Thêm Công Việc
  </button>
</div>

<!-- Tabs -->
<div class="flex gap-2 mb-6">
  <a
    href="#"
    class="bg-[#007050] text-white px-5 py-1.5 rounded-full text-sm font-medium"
    >Tất cả</a
  >
  <a
    href="#"
    class="bg-gray-100 text-gray-600 hover:bg-gray-200 px-5 py-1.5 rounded-full text-sm font-medium transition-colors"
    >Chưa xong</a
  >
  <a
    href="#"
    class="bg-gray-100 text-gray-600 hover:bg-gray-200 px-5 py-1.5 rounded-full text-sm font-medium transition-colors"
    >Đã xong</a
  >
</div>

<!-- Tasks -->
<div class="space-y-4">
  {% for task in tasks %}
  <div
    class="bg-white border border-gray-100 rounded-2xl p-4 flex items-center gap-4 shadow-[0_2px_12px_-4px_rgba(0,0,0,0.05)] hover:shadow-[0_4px_15px_-4px_rgba(0,0,0,0.08)] transition-shadow"
  >
    <form method="POST" action="{% url 'toggle_task' task.id %}">
      {% csrf_token %}
      <button
        type="submit"
        class="w-6 h-6 rounded-full border-2 border-emerald-500 flex items-center justify-center hover:bg-emerald-50 transition-colors"
      >
        {% if task.completed %}
        <svg
          class="w-4 h-4 text-emerald-500"
          fill="currentColor"
          viewBox="0 0 20 20"
        >
          <path
            fill-rule="evenodd"
            d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z"
            clip-rule="evenodd"
          ></path>
        </svg>
        {% endif %}
      </button>
    </form>
    <div class="flex-1">
      <div class="flex items-center gap-3 mb-1">
        <h3
          class="font-medium text-gray-800 {% if task.completed %}line-through text-gray-400{% endif %}"
        >
          {{ task.title }}
        </h3>
        {% if task.project %}
        <span
          class="px-2.5 py-0.5 rounded-full text-[10px] font-bold uppercase tracking-wider bg-{{ task.project.color_theme }}-100 text-{{ task.project.color_theme }}-700"
          >{{ task.project.name }}</span
        >
        {% endif %}
      </div>
      <div class="flex items-center text-xs text-gray-400 gap-1">
        <svg
          class="w-3.5 h-3.5"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"
          ></path>
        </svg>
        {{ task.created_at|date:"H:i d/m" }}
      </div>
    </div>
  </div>
  {% endfor %}
</div>
