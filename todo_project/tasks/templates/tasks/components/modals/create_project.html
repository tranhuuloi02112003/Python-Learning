<div
  id="projectModal"
  class="hidden fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center z-50 transition-opacity"
>
  <div class="bg-white rounded-2xl p-6 w-full max-w-md shadow-2xl">
    <h3 class="text-xl font-bold mb-5 text-gray-800 flex items-center gap-2">
      ✨ Thêm Dự Án Mới
    </h3>
    <form method="POST" action="{% url 'create_project' %}">
      {% csrf_token %}
      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1.5"
          >Tên dự án</label
        >
        <input
          type="text"
          name="name"
          class="w-full border border-gray-200 bg-gray-50 rounded-xl px-4 py-2.5 focus:ring-2 focus:ring-emerald-500 focus:bg-white focus:border-emerald-500 outline-none transition-all"
          placeholder="Nhập tên dự án..."
          required
        />
      </div>
      <div class="mb-8">
        <label class="block text-sm font-medium text-gray-700 mb-1.5"
          >Màu nhãn (Pastel)</label
        >
        <select
          name="color_theme"
          class="w-full border border-gray-200 bg-gray-50 rounded-xl px-4 py-2.5 focus:ring-2 focus:ring-emerald-500 focus:bg-white focus:border-emerald-500 outline-none transition-all"
        >
          <option value="blue">Xanh dương (Blue)</option>
          <option value="orange">Cam (Orange)</option>
          <option value="green">Xanh lá (Green)</option>
          <option value="purple">Tím (Purple)</option>
        </select>
      </div>
      <div class="flex justify-end gap-3">
        <button
          type="button"
          onclick="toggleModal('projectModal')"
          class="px-5 py-2.5 text-gray-600 font-medium hover:bg-gray-100 rounded-xl transition-colors"
        >
          Hủy
        </button>
        <button
          type="submit"
          class="px-5 py-2.5 bg-emerald-500 text-white font-medium rounded-xl hover:bg-emerald-600 shadow-md transition-colors"
        >
          Tạo mới
        </button>
      </div>
    </form>
  </div>
</div>
