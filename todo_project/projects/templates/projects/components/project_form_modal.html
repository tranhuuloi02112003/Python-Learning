<dialog id="{{ modal_id }}" class="w-full max-w-xl rounded-xl p-0 shadow-2xl backdrop:bg-black/35">
  <form method="post" action="{{ form_action }}" class="bg-white p-6">
    {% csrf_token %}
    <input type="hidden" name="next" value="{{ request.get_full_path }}" />
    <div class="flex items-start justify-between gap-4">
      <div>
        <h2 class="font-display text-xl font-bold text-[#191c1e]">{{ modal_title }}</h2>
        <p class="mt-1 text-sm text-[#3d4a42]">Keep projects clear, visible, and easy to scan.</p>
      </div>
      <button type="button" onclick="this.closest('dialog').close()" class="rounded-lg p-2 text-[#3d4a42] hover:bg-[#f7f9fb]" aria-label="Close modal">
        <i data-lucide="x" class="h-5 w-5"></i>
      </button>
    </div>
    <div class="mt-6 grid gap-4">
      <label class="text-sm font-semibold text-[#191c1e]">Name {{ form.name }} {{ form.name.errors }}</label>
      <label class="text-sm font-semibold text-[#191c1e]">Description {{ form.description }} {{ form.description.errors }}</label>
      <div class="grid grid-cols-2 gap-4">
        <label class="text-sm font-semibold text-[#191c1e]">Color {{ form.color_theme }} {{ form.color_theme.errors }}</label>
        <label class="text-sm font-semibold text-[#191c1e]">Status {{ form.status }} {{ form.status.errors }}</label>
      </div>
    </div>
    <div class="mt-6 flex justify-end gap-3">
      <button type="button" onclick="this.closest('dialog').close()" class="rounded-lg px-4 py-2 text-sm font-semibold text-[#3d4a42] hover:bg-[#f7f9fb]">Cancel</button>
      <button type="submit" class="rounded-lg bg-[#059669] px-4 py-2 text-sm font-semibold text-white hover:bg-[#006948]">Save Project</button>
    </div>
  </form>
</dialog>
