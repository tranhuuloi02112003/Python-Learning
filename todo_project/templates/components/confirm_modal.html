<dialog
  x-data="{ title: '', message: '', action: '' }"
  x-ref="dialog"
  @confirm-action.window="title = $event.detail.title; message = $event.detail.message; action = $event.detail.action; $nextTick(() => $refs.dialog.showModal())"
  class="w-full max-w-md rounded-xl p-0 shadow-2xl backdrop:bg-black/35"
  id="confirmModal"
>
  <form method="post" :action="action" class="bg-white p-6">
    {% csrf_token %}
    <input type="hidden" name="next" value="{{ request.path }}" />
    <div class="flex items-start justify-between gap-4">
      <div>
        <h2 class="font-display text-xl font-bold text-[#191c1e]" x-text="title"></h2>
        <p class="mt-2 text-sm leading-6 text-[#3d4a42]" x-text="message"></p>
      </div>
      <button type="button" onclick="this.closest('dialog').close()" class="rounded-lg p-2 text-[#3d4a42] hover:bg-[#f7f9fb]" aria-label="Close modal">
        <i data-lucide="x" class="h-5 w-5"></i>
      </button>
    </div>
    <div class="mt-6 flex justify-end gap-3">
      <button type="button" onclick="this.closest('dialog').close()" class="rounded-lg px-4 py-2 text-sm font-semibold text-[#3d4a42] hover:bg-[#f7f9fb]">Cancel</button>
      <button type="submit" class="rounded-lg bg-[#ba1a1a] px-4 py-2 text-sm font-semibold text-white hover:bg-red-700">Confirm</button>
    </div>
  </form>
</dialog>
